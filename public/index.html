<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERNEX API Premium Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth corporate high-end dark business gradient background */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 50%, #1e1b4b 100%);
            background-attachment: fixed;
        }
        /* Modern glassmorphism for containers */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="text-gray-100 font-sans antialiased min-h-screen">

    <!-- Top Navigation Bar -->
    <header class="bg-slate-950/80 border-b border-slate-800 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-wider text-cyan-400">VERNEX <span class="text-slate-400 font-normal text-sm">API Portal</span></h1>
                <p class="text-xs text-slate-500">Premium Management Suite</p>
            </div>
            <!-- FEATURE 1: Clear Logs Button -->
            <button onclick="clearLogs()" class="text-xs bg-slate-900 hover:bg-red-950/40 text-slate-400 hover:text-red-400 border border-slate-800 hover:border-red-900/60 px-3 py-2 rounded-xl transition-all font-medium">
                Clear History Logs
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

        <!-- Info & URL Section -->
        <section class="glass-card p-6 rounded-2xl shadow-xl">
            <h2 class="text-lg font-bold text-white mb-2">VERNEX Gateway Link</h2>
            <p class="text-sm text-slate-400 mb-4">Use this base format to make requests to your API:</p>
            <!-- FEATURE 2: Copyable Base URL Route -->
            <div class="bg-slate-950/60 p-3 rounded-xl text-xs font-mono text-cyan-400 border border-slate-800 select-all break-all shadow-inner">
                https://[your-vercel-domain].vercel.app/api/number?key=<span class="font-bold text-white bg-slate-800 px-1.5 py-0.5 rounded">YOUR_KEY</span>&num=9876543210
            </div>
        </section>

        <!-- Main Configuration and Inputs Grid -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Side: Form to Create Keys -->
            <div class="lg:col-span-1 glass-card p-6 rounded-2xl shadow-xl space-y-4">
                <h3 class="text-md font-bold text-white border-b border-slate-800 pb-2">Create API Key</h3>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase mb-1">User Name</label>
                        <input type="text" id="keyName" placeholder="e.g., John Doe" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase mb-1">Custom API Key</label>
                        <input type="text" id="keyString" placeholder="e.g., my-secret-key-1" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase mb-1">Expiry Date</label>
                        <input type="date" id="keyExpiry" value="2026-12-31" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase mb-1">Daily Limit</label>
                        <input type="number" id="keyLimit" value="1000" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
                    </div>
                </div>
                
                <!-- FEATURE 3: Simple Save Key Function -->
                <button onclick="createNewKey()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:opacity-90 text-slate-950 font-bold px-4 py-2.5 rounded-xl transition-all text-sm uppercase tracking-wider shadow-lg shadow-cyan-500/10">
                    Save & Add Key
                </button>
            </div>

            <!-- Right Side: Active Keys Display Dashboard -->
            <div class="lg:col-span-2 space-y-4">
                <h3 class="text-md font-bold text-white tracking-wide">Active Vernex Keys</h3>
                <div id="keysGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Cards will display here dynamically -->
                </div>
            </div>
        </section>

        <!-- Simple History Logs Section -->
        <section class="glass-card rounded-2xl p-6 shadow-xl">
            <h3 class="text-xs font-mono font-bold uppercase tracking-widest text-cyan-400 mb-4">Live Request History</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-500 border-b border-slate-800 font-mono text-xs">
                            <th class="pb-2">Time</th>
                            <th class="pb-2">User</th>
                            <th class="pb-2">Number Looked Up</th>
                            <th class="pb-2 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody" class="divide-y divide-slate-900 text-slate-300 font-mono text-xs">
                        <!-- Activity rows display here dynamically -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- UI Interaction Script Engine -->
    <script>
        let database = { keys: {}, history: [] };

        async function syncDatabase(payload = null) {
            try {
                const options = payload ? {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                } : { method: 'GET' };

                const res = await fetch('/api/db', options);
                const data = await res.json();
                
                if (data && (data.keys || data.db)) {
                    database = data.db || data;
                    renderUI();
                }
            } catch (err) {
                console.error("Database connection lost:", err);
            }
        }

        function renderUI() {
            const grid = document.getElementById('keysGrid');
            const logsTable = document.getElementById('logsTableBody');
            
            grid.innerHTML = '';
            logsTable.innerHTML = '';

            // Generate Active Key Components
            Object.keys(database.keys).forEach(tokenKey => {
                const item = database.keys[tokenKey];
                const active = item.status === 'on';
                const card = document.createElement('div');
                card.className = "bg-slate-950/40 border border-slate-800 p-4 rounded-2xl shadow-md flex flex-col justify-between space-y-3 backdrop-blur-sm";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-white text-base truncate max-w-[150px]">${item.name}</h4>
                            <span class="px-2 py-0.5 rounded text-[10px] font-mono font-bold ${active ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}">
                                ${active ? 'Active' : 'Paused'}
                            </span>
                        </div>
                        <p class="text-xs font-mono text-slate-400 bg-slate-950/80 p-2 rounded-xl border border-slate-900 select-all my-2 break-all shadow-inner">${tokenKey}</p>
                        
                        <div class="space-y-1 text-xs text-slate-400">
                            <div><span class="text-slate-500">Usage:</span> ${item.used} / ${item.limit}</div>
                            <div><span class="text-slate-500">Expires:</span> ${item.expiry}</div>
                        </div>
                    </div>

                    <div class="flex gap-2 pt-2 border-t border-slate-900">
                        <!-- FEATURE 4: Simple Switch Toggle Switch Button -->
                        <button onclick="toggleKey('${tokenKey}')" class="flex-1 text-center py-1.5 rounded-lg text-xs font-mono font-bold transition-all ${active ? 'bg-amber-500/10 hover:bg-amber-500/20 text-amber-400' : 'bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400'}">
                            ${active ? 'Pause' : 'Activate'}
                        </button>
                        <!-- FEATURE 5: Delete Key Button -->
                        <button onclick="deleteKey('${tokenKey}')" class="bg-red-500/10 hover:bg-red-500 hover:text-slate-950 text-red-400 px-3 py-1.5 rounded-lg text-xs font-mono font-bold transition-all border border-red-500/20">
                            Delete
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Generate History Logs Table Rows
            if (database.history.length === 0) {
                logsTable.innerHTML = `<tr><td colspan="4" class="text-slate-600 text-center py-6 italic font-mono">No requests streaming over nodes yet.</td></tr>`;
            } else {
                database.history.forEach(log => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-900/40 transition-colors";
                    row.innerHTML = `
                        <td class="py-2.5 text-slate-500">${log.timestamp}</td>
                        <td class="py-2.5 font-bold text-slate-300">${log.key_name}</td>
                        <td class="py-2.5 text-cyan-400 font-mono select-all">${log.queried_num}</td>
                        <td class="py-2.5 text-right text-emerald-400 font-bold">${log.status}</td>
                    `;
                    logsTable.appendChild(row);
                });
            }
        }

        async function createNewKey() {
            const name = document.getElementById('keyName').value.trim();
            const token = document.getElementById('keyString').value.trim();
            const expiry = document.getElementById('keyExpiry').value;
            const limit = parseInt(document.getElementById('keyLimit').value) || 1000;

            if (!name || !token) return alert('Please enter a Name and Key token string!');

            database.keys[token] = { name, expiry, limit, used: 0, status: 'on' };
            await syncDatabase(database);
            
            document.getElementById('keyName').value = '';
            document.getElementById('keyString').value = '';
        }

        async function toggleKey(token) {
            if (database.keys[token]) {
                database.keys[token].status = database.keys[token].status === 'on' ? 'off' : 'on';
                await syncDatabase(database);
            }
        }

        async function deleteKey(token) {
            if (confirm('Delete this API key configuration profile permanently?')) {
                delete database.keys[token];
                await syncDatabase(database);
            }
        }

        async function clearLogs() {
            database.history = [];
            await syncDatabase(database);
        }

        // Initialize and automatically refresh the data layout every 4 seconds
        window.onload = () => {
            syncDatabase();
            setInterval(syncDatabase, 4000);
        };
    </script>
</body>
</html>
